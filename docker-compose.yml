services:
  postgres:
    image: postgres:16-alpine
    container_name: fixflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fixflow_dev
      POSTGRES_USER: fixflow_dev
      POSTGRES_PASSWORD: fixflow_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fixflow_dev -d fixflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
